<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নতুন পোস্ট | SylNet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="logo"><strong>নতুন পোস্ট</strong></div>
    </header>

    <main class="container">
        <div class="card">
            <textarea id="postText" placeholder="আপনার মনের কথা এখানে লিখুন..." style="width: 100%; height: 100px;"></textarea>
            <br><br>
            <button onclick="savePost()" style="width: 100%; padding: 10px; cursor: pointer;">পোস্ট করুন</button>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html">🏠 ঘর</a>
        <a href="majlis.html">👥 মজলিস</a>
        <a href="create-post.html">➕ পোস্ট</a>
        <a href="news.html">🔔 খবর</a>
        <a href="more.html">☰ আরও</a>
    </nav>

    <script>
        function savePost() {
            const text = document.getElementById('postText').value;
            if (text.trim() !== "") {
                // পোস্টটি ব্রাউজারের মেমোরিতে সেভ হচ্ছে
                localStorage.setItem('myNewPost', text);
                // সেভ হওয়ার পর হোম পেজে চলে যাবে
                window.location.href = 'index.html';
            } else {
                alert('দয়া করে কিছু লিখুন!');
            }
        }
    </script>
</body>
</html>
